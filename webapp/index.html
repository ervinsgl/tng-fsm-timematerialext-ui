<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        index.html - SAP UI5 Fiori Application Entry Point
        
        Application: com.tng.fsm.timematerialext.app (FSM Service Confirmation)
        Theme: sap_horizon
        
        Features:
        - Loading screen with spinner (auto-hides after UI5 init or 3s timeout)
        - Mobile-optimized viewport
        - Compact density mode
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Service Confirmation</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* SAP Fiori Style Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: "72", "72full", Arial, Helvetica, sans-serif;
        }
        
        #loading-screen.hidden {
            display: none !important;
        }
        
        /* SAP Fiori App Icon/Logo Area */
        .loading-icon {
            width: 64px;
            height: 64px;
            background: #0a6ed1;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .loading-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
        
        /* App Title */
        .loading-title {
            font-size: 20px;
            font-weight: 400;
            color: #32363a;
            margin-bottom: 32px;
        }
        
        /* SAP Fiori Style Busy Indicator - Three Dots */
        .sap-busy-indicator {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        
        .sap-busy-indicator .dot {
            width: 10px;
            height: 10px;
            background: #0a6ed1;
            border-radius: 50%;
            animation: sapBusyPulse 1.4s ease-in-out infinite;
        }
        
        .sap-busy-indicator .dot:nth-child(1) {
            animation-delay: 0s;
        }
        
        .sap-busy-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .sap-busy-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes sapBusyPulse {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        /* Loading Text */
        .loading-text {
            font-size: 14px;
            color: #6a6d70;
        }
    </style>
    
    <script>
        // Hide loading screen
        function hideLoadingScreen() {
            var loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                loadingScreen.classList.add('hidden');
            }
        }
        
        // Fallback: Force hide after 3 seconds
        setTimeout(hideLoadingScreen, 3000);
    </script>
    
    <!-- UI5 Bootstrap -->
    <script
        id="sap-ui-bootstrap"
        src="https://openui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m"
        data-sap-ui-resource-roots='{"com.tng.fsm.timematerialext.app": "./"}'
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"
        data-sap-ui-frame-options="allow"
        data-sap-ui-xx-component-preload="off"
        data-sap-ui-preload=""
    ></script>
    
    <!-- UI5 Init Handler -->
    <script>
        // Hide loading screen when UI5 initializes
        (function waitForUI5() {
            if (window.sap && window.sap.ui && window.sap.ui.getCore) {
                sap.ui.getCore().attachInit(hideLoadingScreen);
            } else {
                setTimeout(waitForUI5, 100);
            }
        })();
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    
    <!-- SAP Fiori Style Loading Screen -->
    <div id="loading-screen">
        <!-- App Icon -->
        <div class="loading-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
            </svg>
        </div>
        
        <!-- App Title -->
        <div class="loading-title">Service Confirmation</div>
        
        <!-- SAP Style Busy Indicator -->
        <div class="sap-busy-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <!-- Loading Text -->
        <div class="loading-text">Loading application...</div>
    </div>
    
    <!-- UI5 Component Container -->
    <div
        data-sap-ui-component
        data-name="com.tng.fsm.timematerialext.app"
        data-id="container"
        data-settings='{"id" : "com.tng.fsm.timematerialext.app"}'
        data-handle-validation="true"
        style="height: 100%;"
    ></div>
    
</body>
</html>
